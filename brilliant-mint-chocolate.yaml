    black: '#BFA3A3'   # 제안 텍스트 가독성을 위해 배경색보다 밝게 수정
    red: '#A87C7C'   
    green: '#2D9B8E' 
    yellow: '#FFAA00' # 사용자 지정: Amber (MySQL 등)
